name: Build & Release

on:
  push:
    tags:
      - 'v*'          # v1.0.0, v1.2.3 など — タグ push 時のみ実行

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # ── ソースを取得 ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python セットアップ（node-pty ビルド用）────────
      # Python 3.12 で distutils が削除されたため 3.11 を使用
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Node.js セットアップ ──────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 依存関係インストール ──────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── デフォルトアイコン生成 ─────────────────────────
      - name: Generate default icons
        run: node scripts/generate-icons.js
        continue-on-error: true

      # ── ビルド（Renderer + Main）──────────────────────
      - name: Build
        run: npm run build

      # ── GitHub Releases に公開 ────────────────────────
      - name: Release
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
